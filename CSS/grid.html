    <style>
        body {
            margin: 0;
            padding: 0;
        }

        .container {
            background-color: black;
            padding: 10px;
            display: grid;
            gap: 10px;
            grid-template-rows: 4;
            grid-template-columns: 3;
        }

        .common {
            background-color: aqua;
            height: 30px;
        }

        .one {
            grid-column-start: 1;
            grid-column-end: 3;
            grid-row-start: 1;
            grid-row-end: 2;
            display: flex;
            height: min-content;
            justify-content: space-between;
        }

        .two {
            height: 300px;
        }

        .three {
            height: 300px;
        }

        .four {
            grid-column-start: 1;
            grid-column-end: 3;
            grid-row-start: 3;
            grid-row-end: 4;
        }

        .common-1 {
            background-color: red;
            height: 30px;
            width: 100px;
            margin: 10px;
            border-radius: 3px;
        }

        .common-2-1 {
            background-color: red;
            height: 30px;
            width: 30px;
            margin: 10px;
            border-radius: 50%
        }

        .common-2 {
            background-color: red;
            height: 30px;
            width: 100px;
            margin: 10px;
            border-radius: 3px
        }
    </style>


    <div class="container">
        <div class="common one">
            <div class="common-2-1"></div>
            <div style="display: flex;">
                <div class="common-2"></div>
                <div class="common-2"></div>
                <div class="common-2"></div>
            </div>

        </div>
        <div class="common two"></div>
        <div class="common three">
            <div class="common-1"></div>
            <div class="common-1"></div>
            <div class="common-1"></div>
            <div class="common-1"></div>
            <div class="common-1"></div>
        </div>
        <div class="common four"></div>
    </div>

</body>
