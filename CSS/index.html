<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css</title>



    <!-- Internal Css -->
    <style>
        h2 {
            background-color: blue;
            color: #fff;
        }

        h3 {
            color: blue;
        }
    </style>

    <!-- External Link -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Inline Css -->
    <h1 style="color: red; font-size: 15px;">Heading-1</h1>

    <!-- Internal Css -->
    <h2>Heading-2</h2>

    <!-- External Css -->
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Atque tempora nihil magni qui consectetur possimus illo
        adipisci ea dolores.</p>

    <h3 style="color: gray;">Heading 3</h3>

</body>

</html>
